server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / { try_files /index.html =404; }

    location /scheduling/ { alias /usr/share/nginx/html/scheduling/; try_files $uri $uri/ /scheduling/index.html; }
    location /page-replacement/ { alias /usr/share/nginx/html/page-replacement/; try_files $uri $uri/ /page-replacement/index.html; }
    location /disk-scheduling/ { alias /usr/share/nginx/html/disk-scheduling/; try_files $uri $uri/ /disk-scheduling/index.html; }
    location /deadlock/ { alias /usr/share/nginx/html/deadlock/; try_files $uri $uri/ /deadlock/index.html; }
    location /memory-allocation/ { alias /usr/share/nginx/html/memory-allocation/; try_files $uri $uri/ /memory-allocation/index.html; }

    location ~* \.(css|js|json|xml|txt|svg|ico|png)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
